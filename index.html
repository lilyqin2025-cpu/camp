<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lily's Family Resource Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f4f6fb;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.hub{max-width:500px;width:100%;text-align:center}
h1{font-size:22px;font-weight:600;color:#1a1a2e;margin-bottom:6px}
.sub{font-size:13px;color:#888;margin-bottom:32px}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.card{background:#fff;border-radius:14px;border:0.5px solid #e0e0e0;padding:28px 20px;text-decoration:none;color:#1a1a2e;transition:box-shadow .15s}
.card:hover{box-shadow:0 4px 14px rgba(0,0,0,.1)}
.icon{font-size:36px;margin-bottom:12px}
.card-title{font-size:15px;font-weight:600;margin-bottom:5px}
.card-desc{font-size:12px;color:#777;line-height:1.5}
.footer{margin-top:24px;font-size:11px;color:#aaa}
</style>
</head>
<body>
<div class="hub">
  <h1>🌟 Family Resource Hub</h1>
  <div class="sub">Waterloo Region · Ontario · Canada</div>
  <div class="cards">
    <a class="card" href="camps.html">
      <div class="icon">🏕️</div>
      <div class="card-title">Summer Camps</div>
      <div class="card-desc">Local, Ontario & Canada-wide camps by age, type & price</div>
    </a>
    <a class="card" href="math.html">
      <div class="icon">📐</div>
      <div class="card-title">Math Competitions</div>
      <div class="card-desc">Primary to high school — contests, pathways & training</div>
    </a>
  </div>
  <div class="footer">Updated 2026 · lilyqin2025-cpu.github.io/camp</div>
</div>
</body>
</html>
