<html lang="en">
<head>
<meta charset="UTF-8">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f7fa;color:#222;font-size:14px}
.app{max-width:1100px;margin:0 auto;padding:16px}
.header{background:#fff;border-radius:12px;padding:14px 18px;margin-bottom:12px;border:0.5px solid #e0e0e0}
.header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px}
h1{font-size:19px;font-weight:600;color:#1a1a2e}
.subtitle{font-size:12px;color:#888;margin-top:2px}
.tabs{display:flex;gap:5px;flex-wrap:wrap}
.tab{padding:6px 13px;border-radius:20px;border:0.5px solid #ccc;background:#fff;cursor:pointer;font-size:12px;color:#555}
.tab.active{background:#1a5c96;color:#fff;border-color:#1a5c96}
.scope-bar{display:flex;gap:6px;flex-wrap:wrap}
.scope-btn{padding:5px 12px;border-radius:16px;border:0.5px solid #ccc;background:#fff;cursor:pointer;font-size:12px;color:#555}
.scope-btn.active{background:#e8f4ff;color:#1a5c96;border-color:#1a5c96;font-weight:500}
.filters{background:#fff;border-radius:10px;padding:12px 16px;margin-bottom:10px;border:0.5px solid #e0e0e0;display:flex;flex-direction:column;gap:8px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filters label{font-size:12px;color:#666;font-weight:500}
.filters select{border:0.5px solid #ccc;border-radius:6px;padding:5px 8px;font-size:12px;color:#333;background:#fff}
.filters input[type=number]{border:0.5px solid #ccc;border-radius:6px;padding:5px 8px;font-size:12px;color:#333;background:#fff;width:80px}
.filters input[type=text]{border:0.5px solid #ccc;border-radius:6px;padding:6px 10px;font-size:13px;flex:1;min-width:200px;color:#333;background:#fff}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:500}
.badge-open{background:#e6f4ea;color:#1e7b34}
.badge-full{background:#fdecea;color:#c0392b}
.badge-soon{background:#fff3cd;color:#856404}
.badge-closed{background:#f1f1f1;color:#666}
.scope-tag-local{background:#e8f4ff;color:#1a5c96;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:500}
.scope-tag-provincial{background:#f0faf4;color:#1a7a4a;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:500}
.scope-tag-national{background:#fdf6ec;color:#8a5c00;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:500}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}
.card{background:#fff;border-radius:10px;border:0.5px solid #e0e0e0;padding:13px;cursor:pointer;transition:box-shadow .15s}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;gap:6px}
.card-title{font-size:13px;font-weight:600;color:#1a1a2e;line-height:1.3}
.card-org{font-size:11px;color:#666;margin-bottom:6px}
.card-meta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.tag{background:#eef2fb;color:#1a5c96;border-radius:4px;padding:2px 6px;font-size:11px}
.tag-age{background:#f0faf4;color:#1a7a4a}
.tag-price{background:#fdf6ec;color:#7a5c1a}
.tag-overnight{background:#f5eeff;color:#6a2fa0}
.card-activities{font-size:11px;color:#555;line-height:1.5}
.card-reg{font-size:11px;color:#888;margin-top:7px;padding-top:7px;border-top:0.5px solid #f0f0f0}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:22px;max-width:540px;width:100%;max-height:88vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:#666}
.modal h2{font-size:17px;margin-bottom:3px;padding-right:24px}
.modal-org{color:#666;font-size:12px;margin-bottom:12px}
.detail-row{display:flex;margin-bottom:7px;font-size:12px}
.detail-label{width:95px;color:#888;flex-shrink:0;font-weight:500}
.detail-val{color:#333}
.section-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin:12px 0 5px}
.pill-list{display:flex;flex-wrap:wrap;gap:4px}
.pill{background:#eef2fb;color:#1a5c96;border-radius:12px;padding:3px 9px;font-size:11px}
.reminder-btn{background:#1a5c96;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:12px;cursor:pointer;margin-top:12px;width:100%}
.reminder-btn:hover{background:#154f83}
.cal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.cal-card{background:#fff;border-radius:10px;border:0.5px solid #e0e0e0;padding:13px}
.cal-month{font-size:13px;font-weight:600;color:#1a5c96;margin-bottom:9px}
.cal-item{display:flex;gap:7px;align-items:flex-start;margin-bottom:7px;font-size:11px}
.cal-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px}
.cal-dot-open{background:#2ecc71}
.cal-dot-soon{background:#f39c12}
.map-box{background:#e8f0fe;border-radius:10px;padding:18px;border:0.5px solid #c5d8f5}
.map-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:7px;margin-top:10px}
.map-item{background:#fff;border-radius:8px;padding:9px 11px;border:0.5px solid #dce8f5}
.map-item-name{font-size:12px;font-weight:600;color:#1a1a2e}
.map-item-addr{font-size:11px;color:#666;margin-top:1px}
.map-item-camps{font-size:11px;color:#1a5c96;margin-top:3px}
.empty{text-align:center;padding:36px;color:#888}
.count{font-size:12px;color:#666;margin-bottom:8px}
.rem-wrap{display:flex;flex-direction:column;gap:6px}
.rem-item{background:#f8faff;border-radius:8px;padding:9px 12px;border:0.5px solid #d8e4f5;font-size:12px}
.rem-item-name{font-weight:600;color:#1a1a2e}
.rem-remove{float:right;background:none;border:none;cursor:pointer;color:#c0392b;font-size:13px}
.sec-div{font-size:12px;font-weight:600;color:#888;margin:14px 0 6px;padding-bottom:4px;border-bottom:0.5px solid #e8e8e8}
.out-note{background:#fff8e8;border:0.5px solid #f0d080;border-radius:8px;padding:9px 13px;font-size:12px;color:#7a5c00;margin-bottom:10px}
</style>
</head>
<body>
<div class="app">

<div class="header">
  <div class="header-top">
    <div>
      <h1>🏕️ Canadian Summer Camps</h1>
      <div class="subtitle">Waterloo Region · Ontario · Canada-wide — all ages, updated yearly</div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="showTab('camps')">Camps</button>
      <button class="tab" onclick="showTab('calendar')">Registration Dates</button>
      <button class="tab" onclick="showTab('map')">Locations</button>
      <button class="tab" onclick="showTab('reminders')">My Reminders <span id="rem-count"></span></button>
    </div>
  </div>
  <div class="scope-bar">
    <button class="scope-btn active" onclick="setScope('all',this)">All camps</button>
    <button class="scope-btn" onclick="setScope('local',this)">📍 Waterloo Region</button>
    <button class="scope-btn" onclick="setScope('provincial',this)">🏛️ Ontario-wide</button>
    <button class="scope-btn" onclick="setScope('national',this)">🍁 Canada-wide</button>
  </div>
</div>

<div id="tab-camps">
  <div class="filters">
    <div class="filter-row">
      <input type="text" id="f-search" placeholder="🔍  Search: baseball, engineering, swimming, LEGO, overnight…" oninput="render()">
      <button onclick="clearAll()" style="font-size:12px;padding:5px 10px;border-radius:6px;border:0.5px solid #ccc;background:#fff;cursor:pointer">Clear</button>
    </div>
    <div class="filter-row">
      <label>City/Region</label>
      <select id="f-city" onchange="render()">
        <option value="">All locations</option>
        <optgroup label="Waterloo Region">
          <option>Waterloo</option>
          <option>Kitchener</option>
          <option>Cambridge</option>
          <option>Wilmot</option>
        </optgroup>
        <optgroup label="Ontario &amp; Canada">
          <option value="provincial">Ontario-wide</option>
          <option value="national">Canada-wide</option>
        </optgroup>
      </select>
      <label>Age</label>
      <select id="f-age" onchange="render()">
        <option value="">All ages</option>
        <option value="4-6">4–6</option>
        <option value="5-8">5–8</option>
        <option value="7-12">7–12</option>
        <option value="9-14">9–14</option>
        <option value="12-17">12–17</option>
      </select>
      <label>Type</label>
      <select id="f-type" onchange="render()">
        <option value="">All types</option>
        <option>Sports</option>
        <option>STEM / Tech</option>
        <option>Arts</option>
        <option>Nature / Outdoor</option>
        <option>Multi-activity</option>
        <option>Aquatics</option>
        <option>Overnight</option>
        <option>Leadership</option>
      </select>
      <label>Status</label>
      <select id="f-status" onchange="render()">
        <option value="">All</option>
        <option value="open">Open</option>
        <option value="full">Full/Waitlist</option>
        <option value="soon">Opening Soon</option>
      </select>
      <label>Style</label>
      <select id="f-style" onchange="render()">
        <option value="">All styles</option>
        <option value="Day">Day camp only</option>
        <option value="Overnight">Overnight (accommodation incl.)</option>
        <option value="Day/Overnight">Day or Overnight</option>
      </select>
      <label>Max $/wk</label>
      <input type="number" id="f-price" placeholder="e.g. 500" onchange="render()">
    </div>
  </div>
  <div class="count" id="camp-count"></div>
  <div id="camp-grid"></div>
</div>

<div id="tab-calendar" style="display:none">
  <div style="margin-bottom:10px;font-size:13px;color:#555">Key registration dates. Add reminders from any camp card.</div>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<div id="tab-map" style="display:none">
  <div class="map-box">
    <h3 style="font-size:14px;font-weight:600;color:#1a5c96;margin-bottom:6px">Camp Locations</h3>
    <p style="font-size:12px;color:#555">Click any location to open Google Maps.</p>
    <div class="map-grid" id="map-grid"></div>
  </div>
</div>

<div id="tab-reminders" style="display:none">
  <div style="font-size:13px;color:#555;margin-bottom:10px">Camps you have flagged for reminders.</div>
  <div id="reminder-list"></div>
</div>

</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModalBtn()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

var SCOPE_LABEL={local:"📍 Local",provincial:"🏛️ Ontario",national:"🍁 National"};
var SCOPE_CLASS={local:"scope-tag-local",provincial:"scope-tag-provincial",national:"scope-tag-national"};
var STATUS_LABEL={open:"Open",full:"Full/Waitlist",soon:"Opening Soon",closed:"Closed"};
var STATUS_CLASS={open:"badge-open",full:"badge-full",soon:"badge-soon",closed:"badge-closed"};

var currentScope="all";
var reminders=[];
try{reminders=JSON.parse(localStorage.getItem("wr_camp_rem")||"[]")}catch(e){}

function saveRem(){try{localStorage.setItem("wr_camp_rem",JSON.stringify(reminders))}catch(e){}}
function updateRemCount(){document.getElementById("rem-count").textContent=reminders.length?" ("+reminders.length+")":"";}

function setScope(s,btn){
  currentScope=s;
  document.querySelectorAll(".scope-btn").forEach(function(b){b.classList.remove("active")});
  btn.classList.add("active");
  render();
}

function showTab(t){
  ["camps","calendar","map","reminders"].forEach(function(id){
    document.getElementById("tab-"+id).style.display=id===t?"block":"none";
  });
  document.querySelectorAll(".tab").forEach(function(b,i){
    b.classList.toggle("active",["camps","calendar","map","reminders"][i]===t);
  });
  if(t==="calendar")renderCalendar();
  if(t==="map")renderMap();
  if(t==="reminders")renderReminders();
}

function ageMatch(c,val){
  if(!val)return true;
  var parts=val.split("-").map(Number);
  return c.ageMin<=parts[1]&&c.ageMax>=parts[0];
}

function keywordMatch(c,q){
  if(!q)return true;
  var hay=[c.name,c.org,c.city,c.type,c.campStyle,c.ages,c.priceLabel,c.notes||"",c.address].concat(c.activities).join(" ").toLowerCase();
  return q.toLowerCase().split(/\s+/).filter(Boolean).every(function(w){return hay.indexOf(w)>=0});
}

function clearAll(){
  document.getElementById("f-search").value="";
  ["f-city","f-age","f-type","f-status","f-style"].forEach(function(id){document.getElementById(id).value=""});
  document.getElementById("f-price").value="";
  render();
}

function render(){
  var city=document.getElementById("f-city").value;
  var age=document.getElementById("f-age").value;
  var type=document.getElementById("f-type").value;
  var status=document.getElementById("f-status").value;
  var style=document.getElementById("f-style").value;
  var price=parseFloat(document.getElementById("f-price").value)||Infinity;
  var q=document.getElementById("f-search").value.trim();

  var filtered=CAMPS.filter(function(c){
    var scopeOk=currentScope==="all"||c.scope===currentScope;
    var isOut=c.scope!=="local";
    var accomOk=!isOut||c.campStyle==="Overnight"||c.campStyle==="Day/Overnight";
    var cityOk=!city||(city==="provincial"&&c.scope==="provincial")||(city==="national"&&c.scope==="national")||(city!=="provincial"&&city!=="national"&&(c.city===city||c.address.toLowerCase().indexOf(city.toLowerCase())>=0));
    var styleOk=!style||c.campStyle===style;
    return scopeOk&&accomOk&&cityOk&&ageMatch(c,age)&&(!type||c.type===type)&&(!status||c.status===status)&&styleOk&&(c.price===0||c.price<=price)&&keywordMatch(c,q);
  });

  document.getElementById("camp-count").textContent=filtered.length+" camp"+(filtered.length!==1?"s":"")+" found";

  var local=filtered.filter(function(c){return c.scope==="local"});
  var prov=filtered.filter(function(c){return c.scope==="provincial"});
  var natl=filtered.filter(function(c){return c.scope==="national"});

  var outNote="";
  if(currentScope==="provincial"||currentScope==="national"){
    outNote='<div class="out-note">🏠 Out-of-region camps shown here include accommodation (overnight). Day-only out-of-region camps are hidden as they require lodging.</div>';
  }

  var html="";
  if(!filtered.length){html='<div class="empty">No camps match your filters. Try clearing some filters.</div>';}
  else{
    if(local.length)html+='<div class="sec-div">📍 Waterloo Region ('+local.length+')</div><div class="grid">'+local.map(cardHTML).join("")+"</div>";
    if(prov.length)html+='<div class="sec-div">🏛️ Ontario-wide — overnight/accommodation included ('+prov.length+')</div><div class="grid">'+prov.map(cardHTML).join("")+"</div>";
    if(natl.length)html+='<div class="sec-div">🍁 Canada-wide — overnight/accommodation included ('+natl.length+')</div><div class="grid">'+natl.map(cardHTML).join("")+"</div>";
  }
  document.getElementById("camp-grid").innerHTML=outNote+html;
}

function cardHTML(c){
  return'<div class="card" onclick="openModal('+c.id+')">'+
    '<div class="card-header"><div class="card-title">'+c.name+'</div><span class="badge '+STATUS_CLASS[c.status]+'">'+STATUS_LABEL[c.status]+'</span></div>'+
    '<div class="card-org">'+c.org+' &middot; '+c.city+'</div>'+
    '<div class="card-meta"><span class="'+SCOPE_CLASS[c.scope]+'">'+SCOPE_LABEL[c.scope]+'</span><span class="tag">'+c.type+'</span><span class="tag tag-age">Ages '+c.ages+'</span><span class="tag tag-price">'+c.priceLabel+'</span>'+(c.campStyle==="Overnight"?'<span class="tag tag-overnight">Overnight</span>':'')+'</div>'+
    '<div class="card-activities">'+c.activities.slice(0,4).join(" &middot; ")+(c.activities.length>4?" &middot; &hellip;":"")+'</div>'+
    '<div class="card-reg">📅 Reg: '+c.regOpen+'</div>'+
  '</div>';
}

function openModal(id){
  var c=CAMPS.find(function(x){return x.id===id});
  var hasRem=reminders.find(function(r){return r.id===id});
  document.getElementById("modal-body").innerHTML=
    '<h2>'+c.name+'</h2>'+
    '<div class="modal-org">'+c.org+' &middot; '+c.city+'</div>'+
    '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px">'+
      '<span class="badge '+STATUS_CLASS[c.status]+'">'+STATUS_LABEL[c.status]+'</span>'+
      '<span class="'+SCOPE_CLASS[c.scope]+'">'+SCOPE_LABEL[c.scope]+'</span>'+
      '<span class="tag">'+c.type+'</span><span class="tag tag-age">Ages '+c.ages+'</span><span class="tag tag-price">'+c.priceLabel+'</span>'+
      (c.campStyle==="Overnight"?'<span class="tag tag-overnight">Overnight</span>':'')+
    '</div>'+
    '<div class="section-title">Details</div>'+
    '<div class="detail-row"><div class="detail-label">Location</div><div class="detail-val">'+c.address+'</div></div>'+
    '<div class="detail-row"><div class="detail-label">Reg opens</div><div class="detail-val">'+c.regOpen+'</div></div>'+
    '<div class="detail-row"><div class="detail-label">Price</div><div class="detail-val">'+c.priceLabel+'</div></div>'+
    '<div class="detail-row"><div class="detail-label">Camp style</div><div class="detail-val">'+c.campStyle+'</div></div>'+
    '<div class="section-title">Activities</div>'+
    '<div class="pill-list">'+c.activities.map(function(a){return'<span class="pill">'+a+'</span>'}).join("")+'</div>'+
    (c.notes?'<div class="section-title">Notes</div><div style="font-size:12px;color:#555;line-height:1.6">'+c.notes+'</div>':'')+
    '<a href="'+c.link+'" target="_blank" style="display:inline-block;margin-top:12px;font-size:12px;color:#1a5c96">Visit camp website ↗</a>'+
    '<button class="reminder-btn" onclick="toggleReminder('+c.id+')" id="rem-btn-'+c.id+'">'+(hasRem?"✓ Reminder set — click to remove":"🔔 Remind me when registration opens")+'</button>';
  document.getElementById("modal").classList.add("open");
}

function toggleReminder(id){
  var c=CAMPS.find(function(x){return x.id===id});
  var idx=reminders.findIndex(function(r){return r.id===id});
  if(idx>=0){reminders.splice(idx,1);document.getElementById("rem-btn-"+id).textContent="🔔 Remind me when registration opens";}
  else{reminders.push({id:id,name:c.name,org:c.org,regOpen:c.regOpen,scope:c.scope});document.getElementById("rem-btn-"+id).textContent="✓ Reminder set — click to remove";}
  saveRem();updateRemCount();
}

function closeModal(e){if(e.target===document.getElementById("modal"))closeModalBtn();}
function closeModalBtn(){document.getElementById("modal").classList.remove("open");}

function renderCalendar(){
  var periods=[
    {name:"Nov-Dec 2025",items:CAMPS.filter(function(c){return c.regDate<"2026-01-01"})},
    {name:"Jan-Feb 2026",items:CAMPS.filter(function(c){return c.regDate>="2026-01-01"&&c.regDate<"2026-03-01"})},
    {name:"Mar-Apr 2026",items:CAMPS.filter(function(c){return c.regDate>="2026-03-01"&&c.regDate<"2026-05-01"})},
    {name:"Camp Season Jul-Aug 2026",items:[]}
  ];
  document.getElementById("cal-grid").innerHTML=periods.map(function(m){
    return'<div class="cal-card"><div class="cal-month">'+m.name+'</div>'+
    (m.items.length?m.items.map(function(c){
      return'<div class="cal-item"><div class="cal-dot cal-dot-'+c.status+'"></div><div><strong style="font-size:11px">'+c.name+'</strong><br><span class="'+SCOPE_CLASS[c.scope]+'" style="font-size:10px">'+SCOPE_LABEL[c.scope]+'</span><span style="color:#888;font-size:11px"> &middot; '+c.regOpen+'</span></div></div>';
    }).join(""):m.name.indexOf("Camp Season")>=0?'<div style="font-size:12px;color:#555">Most camps run July 6 - August 28, 2026.</div>':'<div style="font-size:12px;color:#aaa">No registrations in this period.</div>')+
    '</div>';
  }).join("");
}

function renderMap(){
  document.getElementById("map-grid").innerHTML=LOCATIONS.map(function(l){
    return'<div class="map-item"><div class="map-item-name">'+l.name+'</div><div class="map-item-addr">'+l.addr+'</div><div class="map-item-camps">'+l.camps+'</div><a href="'+l.maps+'" target="_blank" style="font-size:11px;color:#1a5c96;text-decoration:none;display:inline-block;margin-top:3px">Open in Maps ↗</a></div>';
  }).join("");
}

function renderReminders(){
  updateRemCount();
  var list=document.getElementById("reminder-list");
  if(!reminders.length){list.innerHTML='<div class="empty">No reminders set. Open any camp card and click Remind me.</div>';return;}
  list.innerHTML='<div class="rem-wrap">'+reminders.map(function(r){
    return'<div class="rem-item"><button class="rem-remove" onclick="removeReminder('+r.id+')">✕</button><div class="rem-item-name">'+r.name+'</div><div style="color:#666;font-size:11px;margin-top:2px">'+r.org+' &middot; <span class="'+SCOPE_CLASS[r.scope]+'">'+SCOPE_LABEL[r.scope]+'</span></div><div style="color:#1a5c96;font-size:11px;margin-top:3px">📅 '+r.regOpen+'</div></div>';
  }).join("")+"</div>";
}

function removeReminder(id){
  reminders=reminders.filter(function(r){return r.id!==id});
  saveRem();updateRemCount();renderReminders();
}

updateRemCount();
render();
</script>
